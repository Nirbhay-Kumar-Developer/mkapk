name: "CodeQL Advanced & Linting Pipeline"

on:
  push:
    branches: [ "Dependency-Resolver" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '18 21 * * 2'

jobs:
  # --- DEEP SEMANTIC CODE ANALYSIS (C++, Java) ---
  analyze:
    name: CodeQL Security Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: java-kotlin
            build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java JDK
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality

    # --- MANUAL BUILD FOR C/C++ ---
    - name: Build C/C++ Core & Modules
      if: matrix.language == 'c-cpp'
      shell: bash
      run: |
        sed -i 's/\r$//' compile.sh 2>/dev/null || true
        echo "Attempting build via repository scripts..."
        if [ -f ./compile.sh ] && bash compile.sh; then
          echo "Build via compile.sh succeeded."
        elif [ -f makefile ] && make; then
          echo "Build via makefile succeeded."
        else
          echo "Standard build scripts failed or mismatched environment. Dropping to flat compiler fallback for CodeQL..."
          mkdir -p bin
          
          g++ -std=c++17 \
              -Iinclude \
              src/main.cpp \
              src/mkapk_compiler.cpp \
              src/mkapk_env.cpp \
              src/mkapk_helper.cpp \
              src/modules/*.cpp \
              src/modules/build/*.cpp \
              src/modules/dependency/*.cpp \
              src/modules/plugins/*.cpp \
              -o mkapk_bin || {
                echo "Warning: Direct compilation returned errors due to missing third-party native headers."
                echo "Compiling structural interfaces only to ensure CodeQL extraction covers the architecture..."
                g++ -std=c++17 -c -Iinclude src/*.cpp src/modules/*.cpp src/modules/build/*.cpp src/modules/dependency/*.cpp src/modules/plugins/*.cpp || true
              }
        fi

    # --- MANUAL BUILD FOR JAVA/KOTLIN ---
    - name: Build Java & Kotlin Sources
      if: matrix.language == 'java-kotlin'
      shell: bash
      run: |
        RESGUARD_JAR=$(find . -name "AndResGuard-cli-1.2.15.jar" | head -n 1)
        CP_ARGS=""
        if [ ! -z "$RESGUARD_JAR" ]; then
          CP_ARGS="-cp $RESGUARD_JAR"
        fi

        if [ -d java/com/mkapk/tools ]; then
          javac $CP_ARGS java/com/mkapk/tools/*.java || {
            echo "Direct compilation failed due to missing Android SDK dependencies. Creating structural stubs for CodeQL tracing..."
            mkdir -p mock_src/com/android/tools/r8 mock_src/com/tencent/mm/resourceproguard/cli mock_src/com/android/apksigner mock_src/org/jetbrains/kotlin/preloading
            echo "package com.android.tools.r8; public class D8 { public static void main(String[] a){} }" > mock_src/com/android/tools/r8/D8.java
            echo "package com.android.tools.r8; public class R8 { public static void main(String[] a){} }" > mock_src/com/android/tools/r8/R8.java
            echo "package com.tencent.mm.resourceproguard.cli; public class CliMain { public static void main(String[] a){} }" > mock_src/com/tencent/mm/resourceproguard/cli/CliMain.java
            echo "package com.android.apksigner; public class ApkSignerTool { public static void main(String[] a){} }" > mock_src/com/android/apksigner/ApkSignerTool.java
            echo "package org.jetbrains.kotlin.preloading; public class Preloader { public static void main(String[] a){} }" > mock_src/org/jetbrains/kotlin/preloading/Preloader.java
            javac -sourcepath mock_src java/com/mkapk/tools/*.java
          }
        fi

        if [ -d test/src ]; then
          find test/src -name "*.java" > java_sources.txt
          if [ -s java_sources.txt ]; then
            javac -allow-empty @java_sources.txt || true
          fi
        fi

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  # --- AUTOMATED BUILD SCRIPT AND MAKEFILE LINTING ---
  lint:
    name: Lint Automation Scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      security-events: write
      actions: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run MegaLinter
      uses: oxsecurity/megalinter@v7
      env:
        VALIDATE_ALL_CODEBASE: true
        MEGALINTER_FLAVOR: documentation
        ENABLE_LINTERS: BASH_SHELLCHECK,MAKEFILE_CHECKMAKE
        DISABLE_ERRORS: true
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SARIF_REPORTER: true
        DEFAULT_BRANCH: 'Dependency-Resolver'

    - name: Upload MegaLinter Scan Results to GitHub Security Tab
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'megalinter-reports/megalinter-report.sarif'
